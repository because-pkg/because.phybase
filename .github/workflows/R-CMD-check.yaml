# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macOS-latest, r: "release" }
          - { os: windows-latest, r: "release" }
          - { os: ubuntu-latest, r: "release" }

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jags pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jags
          # On Apple Silicon, Homebrew installs to /opt/homebrew; create symlinks
          # so rjags binaries compiled with /usr/local paths can find libjags
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$(brew --prefix)/lib/libjags.4.dylib" /usr/local/lib/libjags.4.dylib

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $progressPreference = 'silentlyContinue'
          $jagsUrl = "https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.2.exe/download"
          $installer = "$env:TEMP\JAGS-4.3.2.exe"
          Invoke-WebRequest -Uri $jagsUrl -OutFile $installer -MaximumRedirection 10
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
        shell: pwsh

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
